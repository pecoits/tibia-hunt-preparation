<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hunt Element Planner</title>
  </head>
  <body>
    <script>
      (function () {
        var repoPath = '/tibia-hunt-preparation';
        if (window.location.pathname === repoPath) {
          window.location.replace(repoPath + '/' + window.location.search + window.location.hash);
        }
      })();
    </script>
    <main id="app"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
